containerPort: 8080
networkPolicy: AllowExternal
service:
  type: ClusterIP
  port: 8080
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 32Mi
probes:
  liveness:
    initialDelaySeconds: 4
    periodSeconds: 30
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 1
    type: http
    url: /healthz/live
  readiness:
    initialDelaySeconds: 4
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 1
    type: http
    url: /healthz/ready
