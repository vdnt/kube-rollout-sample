secrets:
  enabled: true
  vault:
    paths:
      secretNamespace: bookstore/sandbox
strategy:
  canary:
    maxSurge: 1
    maxUnavailable: 0
istio:
  enabled: true
  peerAuthentication:
    enabled: true
    mtlsMode: STRICT
  resources:
    requests:
      cpu: 128m
      memory: 512Mi
    limits:
      cpu: 256m
      memory: 1Gi
  configScope:
    - ./*
environment: &baseEnvironment
  APP_NAME: bookstore
  LOG_LEVEL: info
  PORT: "8080"
  BOOKSTORE_GREETING: "Hello from the bookstore"
